name: blood_donation_mobile
description: Flutter mobile app for blood donation system
publish_to: 'none' # Prevent accidental publishing
version: 0.1.0+1
environment:
  sdk: "^3.0.0"
  flutter: "^3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.0.5
  flutter_local_notifications: ^15.0.0
  intl: ^0.18.0
  shared_preferences: ^2.2.0
  socket_io_client: ^2.0.1
  firebase_messaging: ^15.0.0
  firebase_core: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
