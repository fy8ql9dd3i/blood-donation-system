name: blood_app
description: A Flutter mobile app for blood donation system
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"   # ✅ fixed (safe version)

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  dio: ^5.4.0
  http: ^1.2.1
  shared_preferences: ^2.2.2
  easy_localization: ^3.0.5
  intl: ^0.20.2
  geocoding: ^2.1.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/